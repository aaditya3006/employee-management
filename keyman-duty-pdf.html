<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keyman Duty PDF Format</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&family=Poppins:wght@400;600;700&display=swap');

:root {
  --yellow: #ffff00;
  --light-green: #90ee90;
  --page-bg: #f1f5f9;
  --card-bg: #ffffff;
  --line: #dbe3ef;
  --ink: #0f172a;
  --blue: #1d4ed8;
  --blue-dark: #1e3a8a;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: linear-gradient(180deg, #dbeafe 0%, var(--page-bg) 42%, #e2e8f0 100%);
  color: var(--ink);
  font-family: 'Poppins', 'Noto Sans Devanagari', sans-serif;
}

.app-shell {
  max-width: 1120px;
  margin: 0 auto;
  padding: 24px 16px 110px;
}

.card {
  background: rgba(255, 255, 255, 0.94);
  border: 1px solid rgba(255, 255, 255, 0.9);
  border-radius: 24px;
  box-shadow: 0 22px 50px rgba(15, 23, 42, 0.12);
  backdrop-filter: blur(12px);
  padding: 24px;
}

.card h1 {
  margin: 0 0 6px;
  font-size: clamp(1.5rem, 4vw, 2rem);
  font-weight: 700;
  color: #0f172a;
}

.card p {
  margin: 0 0 18px;
  color: #475569;
  font-size: 0.95rem;
}

.date-row {
  display: grid;
  grid-template-columns: minmax(0, 220px);
  gap: 14px;
  margin-bottom: 18px;
}

.assignment-list {
  display: grid;
  gap: 14px;
}

.assignment-card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 14px;
  box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
}

.bit-title {
  display: block;
  margin-bottom: 10px;
  font-size: 12px;
  font-weight: 700;
  color: #64748b;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.field-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.6fr) minmax(0, 1fr) minmax(0, 160px);
  gap: 12px;
}

.field label {
  display: block;
  margin-bottom: 6px;
  font-size: 12px;
  font-weight: 700;
  color: #475569;
}

.field input {
  width: 100%;
  min-height: 44px;
  border: 2px solid #dbeafe;
  border-radius: 14px;
  padding: 10px 12px;
  font: inherit;
  outline: none;
  background: #fff;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.field input:focus {
  border-color: #60a5fa;
  box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
}

.gps-input {
  text-align: center;
  font-weight: 700;
  color: var(--blue-dark);
}

.actions,
.preview-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

.actions {
  margin-top: 22px;
}

.btn {
  border: 0;
  border-radius: 999px;
  padding: 13px 28px;
  font: inherit;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
}

.btn:hover {
  transform: translateY(-1px);
}

.btn:active {
  transform: scale(0.98);
}

.btn-primary {
  color: #fff;
  background: linear-gradient(135deg, #1d4ed8, #1e3a8a);
  box-shadow: 0 14px 28px rgba(29, 78, 216, 0.25);
}

.btn-secondary {
  color: #0f172a;
  background: #fff;
  border: 2px solid #d1d5db;
}

.btn-print {
  color: #fff;
  background: linear-gradient(135deg, #dc2626, #b91c1c);
  box-shadow: 0 14px 28px rgba(220, 38, 38, 0.24);
}

#preview-section {
  display: none;
  padding: 18px 16px 110px;
}

#pdf-content {
  width: 210mm;
  background: #fff;
  box-shadow: 0 12px 36px rgba(15, 23, 42, 0.16);
  padding: 14mm 12mm 12mm;
  margin: 0 auto;
}

.patrol-title {
  width: 100%;
  margin-bottom: 0;
  padding: 7px 4px;
  border: 2px solid #000;
  text-align: center;
  background: #fff;
  font: 700 15pt 'Poppins', sans-serif;
  letter-spacing: 0.04em;
}

#dynamic-pdf-table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  color: #000;
  font-family: 'Poppins', 'Noto Sans Devanagari', sans-serif;
}

#dynamic-pdf-table th,
#dynamic-pdf-table td {
  border: 2px solid #000;
  text-align: center;
  vertical-align: middle;
  overflow: hidden;
}

#dynamic-pdf-table th {
  padding: 8px 4px;
  font-weight: 700;
}

#dynamic-pdf-table td {
  height: 58px;
}

.th-bit,
.th-range,
.th-rail,
.th-gps {
  background-color: var(--yellow) !important;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
  font-size: 11pt;
  font-weight: 700;
}

.td-bit,
.td-range {
  padding: 12px 4px;
  font-size: 10.5pt;
  font-weight: 700;
}

.td-duty {
  padding: 12px 4px;
  font-size: 11pt;
  font-weight: 700;
}

.td-name-green,
.td-name-yellow {
  padding: 10px 8px;
  font-family: 'Noto Sans Devanagari', 'Poppins', sans-serif;
  font-size: 12.5pt;
  font-weight: 700;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

.td-name-green { background-color: var(--light-green) !important; }
.td-name-yellow { background-color: var(--yellow) !important; }

.preview-actions {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  padding: 14px 18px;
  background: rgba(255, 255, 255, 0.97);
  backdrop-filter: blur(14px);
  border-top: 1px solid #e5e7eb;
  z-index: 1000;
}

@media (max-width: 768px) {
  .app-shell {
    padding: 16px 10px 96px;
  }

  .card {
    padding: 16px;
    border-radius: 18px;
  }

  .date-row,
  .field-grid {
    grid-template-columns: 1fr;
  }

  #preview-section {
    padding: 0 0 84px;
  }

  #pdf-content {
    width: 100%;
    max-width: 100vw;
    padding: 8px 6px 6px;
    box-shadow: none;
    border: 1px solid #ddd;
  }

  .patrol-title {
    border-width: 1px;
    padding: 5px 2px;
    font-size: 12pt;
    letter-spacing: 0.02em;
  }

  #dynamic-pdf-table th,
  #dynamic-pdf-table td {
    border-width: 1px !important;
    padding: 4px 2px !important;
  }

  #dynamic-pdf-table th,
  .th-bit,
  .th-range,
  .th-rail,
  .th-gps {
    font-size: 8pt !important;
  }

  .td-bit,
  .td-range,
  .td-duty {
    font-size: 8pt !important;
    padding: 5px 2px !important;
  }

  .td-name-green,
  .td-name-yellow {
    font-size: 9pt !important;
    padding: 5px 3px !important;
  }
}

@media print {
  @page { size: A4; margin: 0; }

  body {
    background: #fff !important;
    margin: 0 !important;
    padding: 0 !important;
  }

  .no-print,
  #form-section {
    display: none !important;
    visibility: hidden !important;
  }

  #preview-section {
    display: block !important;
    padding: 0 !important;
  }

  #pdf-content,
  #pdf-content * {
    visibility: visible !important;
  }

  #pdf-content {
    position: static !important;
    width: 210mm !important;
    margin: 0 auto !important;
    padding: 14mm 12mm 12mm !important;
    box-shadow: none !important;
    border: 0 !important;
    background: #fff !important;
  }

  .patrol-title {
    border: 2px solid #000 !important;
    font-size: 15pt !important;
    padding: 7px 4px !important;
  }

  #dynamic-pdf-table th,
  #dynamic-pdf-table td {
    border: 2px solid #000 !important;
    padding: 8px 4px !important;
  }

  * {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }
}
</style>
</head>
<body>
  <div id="form-section" class="app-shell no-print">
    <div class="card">
      <h1>RGD - TIA Keyman Duty PDF</h1>
      <p>Standalone combined HTML, CSS, and JS version of the Keyman duty PDF format.</p>

      <div class="date-row">
        <div class="field">
          <label for="fromDate">Date</label>
          <input type="date" id="fromDate">
        </div>
      </div>

      <div id="bit-assignment-list" class="assignment-list"></div>

      <div class="actions">
        <button class="btn btn-primary" onclick="generatePreview()">Generate Preview</button>
      </div>
    </div>
  </div>

  <section id="preview-section">
    <div id="pdf-content">
      <div class="patrol-title">RGD -TIA keyman duty&nbsp;&nbsp;&nbsp;&nbsp;@<span id="pdf-date-display">14/02/2026</span></div>
      <table id="dynamic-pdf-table"></table>
    </div>

    <div class="preview-actions no-print">
      <button class="btn btn-secondary" onclick="showForm()">Edit Form</button>
      <button class="btn btn-print" onclick="handlePrint()">Print PDF</button>
    </div>
  </section>

<script>
const keymanBitData = [
  { no: "K - 1", range: "km 1 to  km 7"   },
  { no: "K - 2", range: "km 7 to  km 14"  },
  { no: "K - 3", range: "km 14 to  km 18" },
  { no: "K - 4", range: "km 18 to  km 23" },
  { no: "K - 5", range: "km 23 to  km 29" },
  { no: "K - 6", range: "km 29 to  km 34" },
  { no: "K - 7", range: "km 34 to  km 39" },
  { no: "K - 8", range: "km 39 to  km 44" }
];

const keymanDutyNumbers = ["80083", "86639", "85437", "86484", "102861", "80444", "85195", "80374"];

function setupForm() {
  const container = document.getElementById("bit-assignment-list");

  container.innerHTML = keymanBitData.map((bit, i) => `
    <div class="assignment-card">
      <span class="bit-title">${bit.no} [${bit.range}]</span>
      <div class="field-grid">
        <div class="field">
          <label for="emp-search-${i}">Employee Name</label>
          <input type="text" id="emp-search-${i}" placeholder="Enter employee name">
        </div>
        <div class="field">
          <label for="emp-phone-${i}">Mobile No.</label>
          <input type="text" id="emp-phone-${i}" placeholder="Enter mobile number">
        </div>
        <div class="field">
          <label for="gps-number-${i}">GPS No.</label>
          <input type="text" id="gps-number-${i}" class="gps-input" value="${keymanDutyNumbers[i] || ""}">
        </div>
      </div>
    </div>
  `).join("");

  const today = new Date();
  const offset = today.getTimezoneOffset();
  const localDate = new Date(today.getTime() - offset * 60000).toISOString().split("T")[0];
  document.getElementById("fromDate").value = localDate;
}

function formatDateDisplay(dateValue) {
  if (!dateValue) return "14/02/2026";
  const [year, month, day] = dateValue.split("-");
  return `${day}/${month}/${year}`;
}

function generatePreview() {
  const displayDate = formatDateDisplay(document.getElementById("fromDate").value);
  const tableEl = document.getElementById("dynamic-pdf-table");
  const titleDate = document.getElementById("pdf-date-display");

  titleDate.textContent = displayDate;

  const colgroupHTML = `
    <col style="width:13%;">
    <col style="width:35%;">
    <col style="width:39%;">
    <col style="width:13%;">
  `;

  const theadHTML = `
    <tr>
      <th class="th-bit">Bit No.</th>
      <th class="th-range">From........ To</th>
      <th class="th-rail">रेल कर्मचारी</th>
      <th class="th-gps">GPS NO.</th>
    </tr>
  `;

  const tbodyRows = keymanBitData.map((bit, i) => {
    const name = document.getElementById(`emp-search-${i}`).value.trim();
    const phone = document.getElementById(`emp-phone-${i}`).value.trim();
    const dutyNo = document.getElementById(`gps-number-${i}`).value.trim() || "______";
    const cls = i % 2 === 0 ? "td-name-green" : "td-name-yellow";
    const display = name ? `${name} {${phone || "__________"}}` : "________________";

    return `
      <tr>
        <td class="td-bit">${bit.no}</td>
        <td class="td-range">${bit.range}</td>
        <td class="${cls}">${display}</td>
        <td class="td-duty">${dutyNo}</td>
      </tr>
    `;
  }).join("");

  tableEl.innerHTML = `<colgroup>${colgroupHTML}</colgroup><thead>${theadHTML}</thead><tbody>${tbodyRows}</tbody>`;

  document.getElementById("form-section").style.display = "none";
  document.getElementById("preview-section").style.display = "block";
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function showForm() {
  document.getElementById("preview-section").style.display = "none";
  document.getElementById("form-section").style.display = "block";
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function handlePrint() {
  window.print();
}

setupForm();
</script>
</body>
</html>
